name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  codeql:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: CodeQL remediation grep invariants
        shell: bash
        run: |
          set -euo pipefail
          if grep -Fq 'includes("https://' src/commercial/licensePreflight.test.ts test/redaction-rules.test.mjs; then echo "Invariant fail: https includes"; exit 1; fi
          if grep -Fq 'includes("example.com' test/redaction-rules.test.mjs; then echo "Invariant fail: example.com includes"; exit 1; fi
          lines=$(grep -cF 'json(res, 500' src/debugServer.ts || echo 0)
          if [ "$lines" -ne 1 ]; then echo "Invariant fail: json(res,500 line count=$lines expected 1"; exit 1; fi
          if grep -Eq '\bdetails\b' src/debugServer.ts; then echo "Invariant fail: details in debugServer"; exit 1; fi
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v4
      # Avoid uploading SARIF when repo default CodeQL setup is enabled (GitHub rejects mixed submissions).
      - uses: github/codeql-action/analyze@v4
        id: codeql_analyze
        with:
          upload: never
      - name: Assert SARIF has no results for remediation rule IDs
        run: node scripts/assert-codeql-remediation-sarif.mjs "${{ steps.codeql_analyze.outputs['sarif-output'] }}"

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_ADMIN_URL: postgresql://postgres:postgres@localhost:5432/postgres
      POSTGRES_VERIFICATION_URL: postgresql://verifier_ro:verifier@localhost:5432/postgres
      AGENTSKEPTIC_TELEMETRY: "0"
      # Root `test:ci` does not use website DATABASE_URL / TELEMETRY_DATABASE_URL; keep split off so Vitest defaults match “core-only” unless a test stubs otherwise.
      AGENTSKEPTIC_TELEMETRY_WRITES_TELEMETRY_DB: "0"
    steps:
      - uses: actions/checkout@v5
      - name: Assert workflow Postgres URLs use localhost only (static scan)
        run: node scripts/assert-ci-workflows-database-url-hosts.mjs
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install langgraph-reference example dependencies
        run: npm ci --prefix examples/langgraph-reference
      - name: Build, tests, and adoption chain (CI / Postgres)
        run: npm run test:ci

  commercial:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    # Fixture Postgres on the job `services.postgres` container — not production. Separate DB names
    # exercise core vs telemetry routing the same way as split-store production, without remote hosts.
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wfv_website
      TELEMETRY_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wfv_telemetry
      AGENTSKEPTIC_TELEMETRY_WRITES_TELEMETRY_DB: "1"
      AUTH_SECRET: ci_auth_secret_value_at_least_32_chars_ok
      CONTACT_SALES_EMAIL: sales-ci@example.com
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      STRIPE_PRICE_INDIVIDUAL: price_ci_individual
      STRIPE_PRICE_TEAM: price_ci_team
      STRIPE_PRICE_BUSINESS: price_ci_business
      AGENTSKEPTIC_TELEMETRY: "0"
    steps:
      - uses: actions/checkout@v5
      - name: Assert workflow Postgres URLs use localhost only (static scan)
        run: node scripts/assert-ci-workflows-database-url-hosts.mjs
      - name: Assert job env Postgres URLs are localhost (runtime; requires core + telemetry)
        run: node scripts/assert-ci-postgres-env-safety.mjs --require-core-and-telemetry
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Create website database
        working-directory: website
        run: |
          node --input-type=module -e "
          import postgres from 'postgres';
          const sql = postgres('postgresql://postgres:postgres@localhost:5432/postgres');
          try {
            await sql.unsafe('CREATE DATABASE wfv_website');
          } catch (e) {
            const c = /** @type {{ code?: string }} */ (e).code;
            if (c !== '42P04') throw e;
          }
          await sql.end();
          "
      - name: Create telemetry database
        working-directory: website
        run: |
          node --input-type=module -e "
          import postgres from 'postgres';
          const sql = postgres('postgresql://postgres:postgres@localhost:5432/postgres');
          try {
            await sql.unsafe('CREATE DATABASE wfv_telemetry');
          } catch (e) {
            const c = /** @type {{ code?: string }} */ (e).code;
            if (c !== '42P04') throw e;
          }
          await sql.end();
          "
      - name: Validate commercial layer
        run: npm run validate-commercial
      - name: Install Playwright Chromium (website holistic gate)
        run: npx playwright install chromium
      - name: Verify web marketing copy contract
        run: npm run verify:web-marketing-copy

  distribution-consumer:
    needs: [test, commercial]
    # `secrets` cannot be used in job- or step-level `if` (workflow parse error). Probe the PAT via env in a run step, then gate later steps on outputs.
    # Without DISTRIBUTION_GITHUB_TOKEN the default GITHUB_TOKEN cannot reach distributionConsumerRepository (see scripts/distribution-consumer-pipeline.mjs).
    if: github.repository == 'jwekavanagh/agentskeptic' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      AGENTSKEPTIC_TELEMETRY: "0"
    steps:
      - id: distro-token
        name: Check distribution token
        env:
          DISTRIBUTION_GITHUB_TOKEN: ${{ secrets.DISTRIBUTION_GITHUB_TOKEN }}
        run: |
          if [ -n "$DISTRIBUTION_GITHUB_TOKEN" ]; then
            echo "has=true" >> "$GITHUB_OUTPUT"
          else
            echo "has=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip distribution consumer (no token)
        if: steps.distro-token.outputs.has == 'false'
        run: echo "DISTRIBUTION_GITHUB_TOKEN is not set; skipping distribution consumer pipeline."
      - uses: actions/checkout@v5
        if: steps.distro-token.outputs.has == 'true'
      - uses: actions/setup-node@v5
        if: steps.distro-token.outputs.has == 'true'
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        if: steps.distro-token.outputs.has == 'true'
        run: npm ci
      - name: Build TypeScript
        if: steps.distro-token.outputs.has == 'true'
        run: npm run build
      - name: Distribution consumer pipeline (P1–P8)
        if: steps.distro-token.outputs.has == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Required: default token cannot access repos/${distributionConsumerRepository}. Fine-grained PAT must include that repo (Contents + Actions).
          DISTRIBUTION_GITHUB_TOKEN: ${{ secrets.DISTRIBUTION_GITHUB_TOKEN }}
        run: node scripts/distribution-consumer-pipeline.mjs
