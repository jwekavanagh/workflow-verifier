name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_ADMIN_URL: postgresql://postgres:postgres@localhost:5432/postgres
      POSTGRES_VERIFICATION_URL: postgresql://verifier_ro:verifier@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Postgres schema (CI)
        run: node scripts/pg-ci-init.mjs
      - name: Unit tests (Vitest)
        run: npm run test:vitest
      - name: Node integration tests
        run: npm run test:node
      - name: Workflow truth contract (Postgres CLI)
        run: npm run test:workflow-truth-contract
      - name: First-run examples
        run: node scripts/first-run.mjs
