# secrets.NPM_TOKEN: granular token, Read and write on agentskeptic (or All packages).
#
# CI publish + 2FA: if the website has no "Bypass two-factor authentication" checkbox, try:
# 1) Under Packages and scopes, pick "All packages" or your package and set Read and write,
#    then scroll General again (some UIs only show bypass after write is selected).
# 2) Create the token via CLI (npm ≥ 11); bypass still needs one OTP from your authenticator:
#    npm token create --name=github-actions-publish --packages-all --packages-and-scopes-permission=read-write --bypass-2fa
#    https://docs.npmjs.com/cli/v11/commands/npm-token
# 3) One-time local publish: npm publish ... --otp=<6-digit> from your machine.
# 4) After the package exists on npm: Trusted Publishing (OIDC) — no long-lived publish token.
#    https://docs.npmjs.com/trusted-publishers
name: Commercial npm publish

on:
  workflow_dispatch:
    inputs:
      commercial_license_api_base_url:
        description: "Production app URL (no trailing slash), e.g. https://app.example.com"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Registry auth and target (diagnostics)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          echo "node $(node -v) npm $(npm -v)"
          npm config get registry
          npm whoami --registry https://registry.npmjs.org
      - name: Build commercial CLI
        env:
          WF_BUILD_PROFILE: commercial
          COMMERCIAL_LICENSE_API_BASE_URL: ${{ github.event.inputs.commercial_license_api_base_url }}
        run: node scripts/build-commercial.mjs
      - name: Assert embedded license URL
        run: grep -Fq "${{ github.event.inputs.commercial_license_api_base_url }}" dist/generated/commercialBuildFlags.js
      - name: Upgrade npm (trusted publishing / OIDC needs CLI ≥ 11.5.1)
        run: npm install -g npm@11.5.1
      - name: Publish root package to npmjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          WF_BUILD_PROFILE: commercial
          COMMERCIAL_LICENSE_API_BASE_URL: ${{ github.event.inputs.commercial_license_api_base_url }}
        run: |
          set -e
          npm publish . --access public --registry https://registry.npmjs.org --workspaces=false
      - name: Verify tarball reached registry (HTTP)
        run: |
          set -e
          ver=$(node -p "require('./package.json').version")
          # Registry read-after-write can lag briefly after PUT; retry before failing the job.
          for i in $(seq 1 25); do
            if curl -fsS -o /dev/null "https://registry.npmjs.org/agentskeptic/${ver}" 2>/dev/null \
              && npm view "agentskeptic@${ver}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
              npm view "agentskeptic@${ver}" version --registry=https://registry.npmjs.org
              exit 0
            fi
            echo "verify: agentskeptic@${ver} not visible yet (attempt ${i}/25), sleeping 3s"
            sleep 3
          done
          echo "verify: timed out waiting for agentskeptic@${ver}"
          exit 1
