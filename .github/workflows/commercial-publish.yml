# Requires secrets.NPM_TOKEN: when npm 2FA is enabled for writes, the granular token must
# have "Bypass two-factor authentication" checked (npm website → Access Tokens →
# Generate New Token). See https://docs.npmjs.com/creating-and-viewing-access-tokens
name: Commercial npm publish

on:
  workflow_dispatch:
    inputs:
      commercial_license_api_base_url:
        description: "Production app URL (no trailing slash), e.g. https://app.example.com"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Registry auth and target (diagnostics)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          echo "node $(node -v) npm $(npm -v)"
          npm config get registry
          npm whoami --registry https://registry.npmjs.org
      - name: Build commercial CLI
        env:
          WF_BUILD_PROFILE: commercial
          COMMERCIAL_LICENSE_API_BASE_URL: ${{ github.event.inputs.commercial_license_api_base_url }}
        run: node scripts/build-commercial.mjs
      - name: Assert embedded license URL
        run: grep -Fq "${{ github.event.inputs.commercial_license_api_base_url }}" dist/generated/commercialBuildFlags.js
      - name: Publish root package to npmjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          WF_BUILD_PROFILE: commercial
          COMMERCIAL_LICENSE_API_BASE_URL: ${{ github.event.inputs.commercial_license_api_base_url }}
        run: |
          set -e
          npm publish . --access public --registry https://registry.npmjs.org --workspaces=false
      - name: Verify tarball reached registry (HTTP)
        run: |
          set -e
          curl -fsS -o /dev/null "https://registry.npmjs.org/agentskeptic/latest"
          npm view agentskeptic@0.1.1 version --registry=https://registry.npmjs.org
