# Commercial npm publish uses Trusted Publishing (OIDC). Operator details: CONTRIBUTING.md
# (GitHub Actions). npm: https://docs.npmjs.com/trusted-publishers
name: Commercial npm publish

on:
  workflow_dispatch:
    inputs:
      commercial_license_api_base_url:
        description: "Production app URL (no trailing slash), e.g. https://app.example.com"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      AGENTSKEPTIC_TELEMETRY: "0"
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build commercial CLI
        env:
          WF_BUILD_PROFILE: commercial
          COMMERCIAL_LICENSE_API_BASE_URL: ${{ github.event.inputs.commercial_license_api_base_url }}
        run: node scripts/build-commercial.mjs
      - name: Assert embedded license URL
        run: grep -Fq "${{ github.event.inputs.commercial_license_api_base_url }}" dist/generated/commercialBuildFlags.js
      - name: Upgrade npm (trusted publishing / OIDC needs CLI ≥ 11.5.1)
        run: npm install -g npm@11.5.1
      - name: Publish root package to npmjs
        env:
          WF_BUILD_PROFILE: commercial
          COMMERCIAL_LICENSE_API_BASE_URL: ${{ github.event.inputs.commercial_license_api_base_url }}
        run: |
          set -e
          npm publish . --access public --registry https://registry.npmjs.org --workspaces=false
      - name: Verify tarball reached registry (HTTP)
        run: |
          set -e
          ver=$(node -p "require('./package.json').version")
          # Registry read-after-write can lag briefly after PUT; retry before failing the job.
          for i in $(seq 1 25); do
            if curl -fsS -o /dev/null "https://registry.npmjs.org/agentskeptic/${ver}" 2>/dev/null \
              && npm view "agentskeptic@${ver}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
              npm view "agentskeptic@${ver}" version --registry=https://registry.npmjs.org
              exit 0
            fi
            echo "verify: agentskeptic@${ver} not visible yet (attempt ${i}/25), sleeping 3s"
            sleep 3
          done
          echo "verify: timed out waiting for agentskeptic@${ver}"
          exit 1
